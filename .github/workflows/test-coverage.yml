name: Coverage

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==2.2.1

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage JSON
        run: |
          poetry run pytest --cov --cov-report= --cov-report=term-missing --cov-report=json

      - name: Upload coverage JSON
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json

      - name: Extract coverage
        id: coverage
        shell: bash
        run: |
          ./.github/scripts/extract-coverage-badge.sh coverage.json | tee -a "$GITHUB_OUTPUT"

      - name: Update coverage badge gist
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: dde6edd698fb5f25063c01f49ba251d7
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percent }}%
          color: ${{ steps.coverage.outputs.color }}
