name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # required for PyPI trusted publisher

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry==2.2.1"

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publisher — no API token needed.
        # One-time setup on PyPI:
        #   1. Go to pypi.org → your project → Publishing → Add trusted publisher
        #   2. Set: owner=ohmycoffe, repo=kube-envx,
        #      workflow=release.yml, environment=pypi

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
